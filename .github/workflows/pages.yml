name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4

      - name: Prettier format check
        run: npx --yes prettier --check --ignore-unknown "*.html" "css/**/*.css" "js/**/*.js" "README.md" ".github/workflows/**/*.yml" "robots.txt" "sitemap.xml"

      - name: HTMLHint
        run: npx --yes htmlhint "*.html"

      - name: Validate static site
        run: python scripts/validate-static.py

      - name: Install Playwright test runner
        run: npm install --no-save @playwright/test@1.60.0

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright smoke tests
        run: npx playwright test

      - name: Prepare static site
        run: |
          mkdir _site
          cp *.html favicon.svg CNAME robots.txt sitemap.xml og-image.png _site/
          cp -r css js _site/

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
