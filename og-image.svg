<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background: primary dark -->
  <rect width="1200" height="630" fill="#114a3a"/>

  <!-- Subtle accent bar top -->
  <rect x="0" y="0" width="1200" height="8" fill="#f2b705"/>

  <!-- Large Rp watermark for motif inspiration from favicon -->
  <text x="960" y="520" font-family="system-ui, -apple-system, sans-serif" font-size="320" font-weight="700" fill="#1a6b54" text-anchor="middle" opacity="0.35">Rp</text>

  <!-- Title text -->
  <text x="100" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="700" fill="#ffffff" text-anchor="start">HitungPesangon</text>

  <!-- Accent underline -->
  <rect x="100" y="310" width="260" height="6" rx="3" fill="#f2b705"/>

  <!-- Subtitle text -->
